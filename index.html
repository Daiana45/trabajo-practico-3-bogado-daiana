<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Los Simpsons</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="container">
    <h1 class="text-center my-3">Los Simpsons</h1>

    <!-- Buscador -->
    <form class="mb-3">
      <input type="text" class="form-control" placeholder="Buscar personaje">
      <button type="submit" class="btn btn-primary mt-2">Buscar</button>
    </form>

    <!-- Listado -->
    <div id="lista-personaje" class="row"></div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="modalDetalle" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 id="modalNombre" class="modal-title"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <img id="modalImagen" class="img-fluid mb-3" alt="">
          <p><strong>Ocupación:</strong> <span id="modalOcupacion"></span></p>
          <p><strong>Estado:</strong> <span id="modalEstado"></span></p>
          <p><strong>Frase:</strong> <span id="modalFrase"></span></p>
          <p><strong>Edad:</strong> <span id="modalEdad"></span></p>
         <p><strong>Fecha de nacimiento:</strong> <span id="modalNacimiento"></span></p>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/script.js"></script>
</body>
</html>
